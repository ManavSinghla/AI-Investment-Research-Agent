<canvas id="shader-canvas-ANIMATION_3" style="display:block;width:100%;height:100%"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_3');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
varying vec2 v_texCoord;
uniform float u_time;
uniform vec2 u_resolution;
uniform vec2 u_mouse;

// Noise functions for organic movement
vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }

float snoise(vec2 v) {
    const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
    vec2 i  = floor(v + dot(v, C.yy) );
    vec2 x0 = v -   i + dot(i, C.xx);
    vec2 i1;
    i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
    vec4 x12 = x0.xyxy + C.xxzz;
    x12.xy -= i1;
    i = mod289(i);
    vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 )) + i.x + vec3(0.0, i1.x, 1.0 ));
    vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
    m = m*m ;
    m = m*m ;
    vec3 x = 2.0 * fract(p * C.www) - 1.0;
    vec3 h = abs(x) - 0.5;
    vec3 a0 = x - floor(x + 0.5);
    vec3 g = a0 * vec3(x0.x,x12.xz) + h * vec3(x0.y,x12.yw);
    return 130.0 * dot(m, g);
}

void main() {
    vec2 uv = (v_texCoord * 2.0 - 1.0) * (u_resolution.y / u_resolution.x);
    float d = length(uv);
    
    // Core glow
    float glow = 0.05 / pow(d, 1.2);
    
    // Organic noise layers
    float n = snoise(uv * 1.5 + u_time * 0.2);
    n += 0.5 * snoise(uv * 3.0 - u_time * 0.4);
    
    // Pulse based on time
    float pulse = sin(u_time * 0.5) * 0.1 + 0.9;
    
    // Atmosphere
    vec3 color = vec3(1.0); // Pure white/silver base
    float alpha = smoothstep(0.8, 0.2, d * pulse + n * 0.1);
    
    // Edge highlight
    float edge = smoothstep(0.48, 0.5, d) * smoothstep(0.52, 0.5, d);
    
    vec3 finalColor = color * (glow + alpha * 0.3 + edge * 0.8);
    
    // Mouse interaction
    float mouseDist = length(uv - (u_mouse/u_resolution * 2.0 - 1.0));
    finalColor += color * (0.1 / pow(mouseDist + 0.5, 2.0)) * 0.5;

    gl_FragColor = vec4(finalColor, alpha * 0.8);
}
`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>

<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_4');
  const devicePixelRatio = window.devicePixelRatio || 1;
  // AlphaLens 3D Environment - Cinematic Sphere & Particle System
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

// Central Intelligence Sphere (Wireframe/Geometric)
const geometry = new THREE.IcosahedronGeometry(2, 4);
const material = new THREE.MeshPhongMaterial({
    color: 0xffffff,
    wireframe: true,
    transparent: true,
    opacity: 0.1,
    emissive: 0xffffff,
    emissiveIntensity: 0.2
});
const sphere = new THREE.Mesh(geometry, material);
scene.add(sphere);

// Inner Core Glow (Point Light)
const light = new THREE.PointLight(0xffffff, 2, 10);
light.position.set(0, 0, 0);
scene.add(light);

// Floating Particles (News Events/Sentiment)
const particlesCount = 200;
const positions = new Float32Array(particlesCount * 3);
for (let i = 0; i < particlesCount; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 10;
    positions[i * 3 + 1] = (Math.random() - 0.5) * 10;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 10;
}
const particlesGeometry = new THREE.BufferGeometry();
particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particlesMaterial = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.02,
    transparent: true,
    opacity: 0.5
});
const particles = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particles);

// Orbits (Financial Metrics)
const createOrbit = (radius, speed, color) => {
    const orbitGeo = new THREE.RingGeometry(radius, radius + 0.01, 64);
    const orbitMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.2, side: THREE.DoubleSide });
    const orbit = new THREE.Mesh(orbitGeo, orbitMat);
    orbit.rotation.x = Math.PI / 2;
    orbit.rotation.y = Math.random() * Math.PI;
    
    // Add a small pulse node on the orbit
    const nodeGeo = new THREE.SphereGeometry(0.05, 16, 16);
    const nodeMat = new THREE.MeshBasicMaterial({ color: color });
    const node = new THREE.Mesh(nodeGeo, nodeMat);
    
    const group = new THREE.Group();
    group.add(orbit);
    group.add(node);
    node.position.x = radius;
    
    return { group, speed, radius };
};

const orbits = [
    createOrbit(2.5, 0.01, 0xffffff),
    createOrbit(3.2, -0.007, 0xcccccc),
    createOrbit(4.0, 0.005, 0xffffff)
];
orbits.forEach(o => scene.add(o.group));

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.1);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
directionalLight.position.set(5, 5, 5);
scene.add(directionalLight);

// Animation
let time = 0;
const animate = () => {
    requestAnimationFrame(animate);
    time += 0.01;
    
    sphere.rotation.y += 0.002;
    sphere.rotation.x += 0.001;
    
    particles.rotation.y -= 0.0005;
    
    orbits.forEach(o => {
        o.group.rotation.y += o.speed;
        o.group.children[1].position.x = Math.cos(time * o.speed * 50) * o.radius;
        o.group.children[1].position.z = Math.sin(time * o.speed * 50) * o.radius;
    });

    renderer.render(scene, camera);
};

// Handle Resize
window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

animate();

})();
</script>
