<style>
        body { background-color: #141313; color: #e5e2e1; overflow: hidden; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }
        .scroll-indicator {
            width: 1px;
            height: 48px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.5), transparent);
            animation: pulse-scroll 2s infinite ease-in-out;
        }
        @keyframes pulse-scroll {
            0% { transform: scaleY(0.8); opacity: 0.5; transform-origin: top; }
            50% { transform: scaleY(1.2); opacity: 1; transform-origin: top; }
            100% { transform: scaleY(0.8); opacity: 0.5; transform-origin: top; }
        }
        .reveal-text {
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
            animation: slide-up 1s cubic-bezier(0.77, 0, 0.175, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes slide-up {
            to { opacity: 1; transform: translateY(0); }
        }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
    </style>

<body class="antialiased min-h-screen relative w-full flex flex-col font-body-md text-body-md">
<!-- Background Animation -->
<div class="fixed inset-0 w-full h-full z-0 opacity-80 mix-blend-screen pointer-events-none">

</div>
<!-- Vignette / Gradient Overlay -->
<div class="fixed inset-0 w-full h-full z-0 pointer-events-none bg-[radial-gradient(ellipse_at_center,_transparent_20%,_#141313_100%)]"></div>
<!-- Top Navigation (Shared Component) -->
<header class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-xl border-b border-white/10 text-primary">
<div class="flex justify-between items-center px-container-padding h-20 w-full">
<div class="font-display-lg text-display-lg-mobile md:text-display-lg tracking-tighter text-primary">AlphaLens</div>
<nav class="hidden md:flex space-x-12">
<a class="text-outline font-label-caps text-label-caps hover:text-primary transition-colors duration-300" href="#">Intelligence</a>
<a class="text-primary border-b border-primary pb-1 font-label-caps text-label-caps hover:text-primary transition-colors duration-300 opacity-80 transition-opacity" href="#">Ecosystem</a>
<a class="text-outline font-label-caps text-label-caps hover:text-primary transition-colors duration-300" href="#">Financials</a>
</nav>
<button class="hidden md:flex items-center space-x-2 px-6 py-2 border-[0.5px] border-white/20 rounded-DEFAULT hover:border-white hover:bg-white/10 transition-all duration-300 group">
<span class="font-label-caps text-label-caps text-primary uppercase">Connect</span>
<span class="material-symbols-outlined text-[16px] text-primary group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<!-- Mobile Menu Icon (Simplified for structure) -->
<button class="md:hidden text-primary">
<span class="material-symbols-outlined">menu</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-grow flex flex-col justify-center items-center px-safe-area-mobile md:px-container-padding pt-24 pb-32 min-h-screen">
<!-- Central Typography Cluster -->
<div class="text-center flex flex-col items-center justify-center space-y-6 max-w-4xl mx-auto w-full">
<div class="flex items-center space-x-4 reveal-text">
<span class="w-12 h-[1px] bg-white/30"></span>
<span class="font-label-caps text-label-caps text-outline tracking-widest uppercase">STAGE IV</span>
<span class="w-12 h-[1px] bg-white/30"></span>
</div>
<h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-primary reveal-text delay-100">
                Competitive Landscape
            </h1>
<h2 class="font-headline-md text-headline-md text-surface-tint tracking-wide reveal-text delay-200">
                NVIDIA
            </h2>
</div>
<!-- Ecosystem Insights Panels (Absolute positioning for desktop, flow for mobile) -->
<div class="w-full flex flex-col md:flex-row justify-between items-center absolute top-1/2 -translate-y-1/2 px-safe-area-mobile md:px-container-padding pointer-events-none mt-48 md:mt-0 gap-8 md:gap-0">
<!-- Left Panel -->
<div class="glass-panel p-8 rounded-lg max-w-xs text-left reveal-text delay-300 pointer-events-auto w-full md:w-auto relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-r from-white/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
<div class="font-label-caps text-label-caps text-outline mb-4">MARKET SIMILARITY</div>
<div class="font-mono-data text-[48px] font-light text-primary leading-none mb-4 tracking-tighter">94%</div>
<p class="font-body-md text-body-md text-on-surface-variant text-sm leading-relaxed">
                    High architectural overlap in data center GPU segments.
                </p>
<div class="w-full h-[1px] bg-gradient-to-r from-white/20 to-transparent mt-6"></div>
</div>
